<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Наставник 🍵</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:      var(--tg-theme-bg-color, #ffffff);
  --sec-bg:  var(--tg-theme-secondary-bg-color, #f4f4f4);
  --text:    var(--tg-theme-text-color, #000000);
  --hint:    var(--tg-theme-hint-color, #8e8e93);
  --btn:     var(--tg-theme-button-color, #007aff);
  --btn-txt: var(--tg-theme-button-text-color, #ffffff);
  --green: #34c759;
  --red:   #ff3b30;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: var(--sec-bg);
  padding: 12px 16px;
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}

/* ── Tabs content ── */
.tabs-content {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}

.tab-pane {
  display: none;
  padding: 16px;
}
.tab-pane.active { display: block; }

/* ── Bottom nav ── */
.bottom-nav {
  display: flex;
  background: var(--sec-bg);
  border-top: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 0 12px;
  background: none;
  border: none;
  color: var(--hint);
  font-size: 10px;
  gap: 3px;
  cursor: pointer;
  transition: color 0.15s;
}
.nav-btn .icon { font-size: 22px; }
.nav-btn.active { color: var(--btn); }

/* ── Cards ── */
.card {
  background: var(--sec-bg);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--hint);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.card-header .card-title { margin-bottom: 0; }

/* ── Stats grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
}
.stat-item { text-align: center; }
.stat-value {
  font-size: 18px;
  font-weight: 700;
}
.stat-label {
  font-size: 11px;
  color: var(--hint);
  margin-top: 2px;
}
.stat-value.income  { color: var(--green); }
.stat-value.expense { color: var(--red); }
.stat-value.pos { color: var(--green); }
.stat-value.neg { color: var(--red); }

/* ── Debt items ── */
.debt-item { margin-bottom: 14px; }
.debt-item:last-child { margin-bottom: 0; }
.debt-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.debt-supplier { font-weight: 600; font-size: 15px; }
.debt-amount { font-weight: 600; font-size: 15px; color: var(--red); }
.debt-amount.done { color: var(--green); }
.progress-bar {
  height: 5px;
  background: rgba(0,0,0,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.debt-meta {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
  font-size: 11px;
  color: var(--hint);
}

/* ── Loading ── */
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid rgba(0,0,0,0.1);
  border-top-color: var(--btn);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-center { display: flex; justify-content: center; padding: 24px; }

/* ── Add form ── */
.type-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}
.type-btn {
  flex: 1;
  padding: 10px 6px;
  border-radius: 10px;
  border: none;
  background: var(--sec-bg);
  color: var(--hint);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.type-btn.active {
  background: var(--btn);
  color: var(--btn-txt);
}

.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--hint);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}
.form-input, .form-select {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid rgba(0,0,0,0.08);
  background: var(--sec-bg);
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(--btn); }

/* Category chips */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.chip {
  padding: 5px 12px;
  border-radius: 16px;
  background: rgba(0,0,0,0.05);
  border: 1.5px solid transparent;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.12s;
}
.chip.selected {
  background: var(--btn);
  color: var(--btn-txt);
}

.submit-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: var(--btn);
  color: var(--btn-txt);
  font-size: 16px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.15s;
}
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 76px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(0,0,0,0.82);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok  { background: var(--green); }
.toast.err { background: var(--red); }

/* ── Refresh btn ── */
.refresh-btn {
  background: none;
  border: none;
  color: var(--btn);
  font-size: 13px;
  cursor: pointer;
  padding: 0;
}

.empty-hint {
  text-align: center;
  color: var(--hint);
  font-size: 14px;
  padding: 20px 0;
}

/* ── Chat tab ── */
#tab-chat {
  display: none;
  flex-direction: column;
  height: 100%;
  padding: 0;
}
#tab-chat.active { display: flex; }

.chat-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.bubble {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.45;
  word-break: break-word;
}
.bubble.user {
  background: var(--btn);
  color: var(--btn-txt);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.bubble.bot {
  background: var(--sec-bg);
  color: var(--text);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.chat-bar {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 8px 12px 12px;
  background: var(--bg);
  border-top: 1px solid rgba(0,0,0,0.07);
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 20px;
  border: 1.5px solid rgba(0,0,0,0.08);
  background: var(--sec-bg);
  color: var(--text);
  font-size: 15px;
  outline: none;
  resize: none;
  max-height: 96px;
  min-height: 40px;
  overflow-y: auto;
  line-height: 1.4;
}
.chat-input:focus { border-color: var(--btn); }
.send-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--btn);
  color: var(--btn-txt);
  border: none;
  cursor: pointer;
  font-size: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
.send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">🍵 Финансовый наставник</div>

<div class="tabs-content" id="tabs-content">

  <!-- ── DASHBOARD TAB ── -->
  <div class="tab-pane active" id="tab-dashboard">

    <div class="card">
      <div class="card-header">
        <div class="card-title">СЕГОДНЯ</div>
        <button class="refresh-btn" onclick="loadDashboard()">↻ обновить</button>
      </div>
      <div class="loading-center" id="snap-loading"><div class="spinner"></div></div>
      <div id="snap-data" style="display:none">
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value income" id="s-income">—</div>
            <div class="stat-label">Доход</div>
          </div>
          <div class="stat-item">
            <div class="stat-value expense" id="s-expense">—</div>
            <div class="stat-label">Расход</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="s-balance">—</div>
            <div class="stat-label">Баланс</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">ДОЛГИ</div>
      <div class="loading-center" id="debts-loading"><div class="spinner"></div></div>
      <div id="debts-list"></div>
    </div>

  </div>

  <!-- ── ADD TAB ── -->
  <div class="tab-pane" id="tab-add">

    <div class="type-selector">
      <button class="type-btn active" data-type="income"  onclick="setType('income')">💰 Доход</button>
      <button class="type-btn"        data-type="expense" onclick="setType('expense')">💸 Расход</button>
      <button class="type-btn"        data-type="repay"   onclick="setType('repay')">✅ Долг</button>
    </div>

    <div class="form-group">
      <label class="form-label">СУММА (₴)</label>
      <input type="number" class="form-input" id="f-amount" placeholder="0" inputmode="decimal" min="0">
    </div>

    <div id="income-fields">
      <div class="form-group">
        <label class="form-label">ИСТОЧНИК</label>
        <input type="text" class="form-input" id="f-income-desc" placeholder="Продажа чая, церемония…">
      </div>
    </div>

    <div id="expense-fields" style="display:none">
      <div class="form-group">
        <label class="form-label">КАТЕГОРИЯ</label>
        <div class="chips" id="cat-chips">
          <div class="chip selected" onclick="pickChip(this)">Закупка чая</div>
          <div class="chip" onclick="pickChip(this)">Аренда</div>
          <div class="chip" onclick="pickChip(this)">Реклама</div>
          <div class="chip" onclick="pickChip(this)">Бытовое</div>
          <div class="chip" onclick="pickChip(this)">Личное</div>
          <div class="chip" onclick="pickChip(this)">Другое</div>
        </div>
        <input type="text" class="form-input" id="f-expense-cat" value="Закупка чая" placeholder="Или введи свою">
      </div>
    </div>

    <div id="repay-fields" style="display:none">
      <div class="form-group">
        <label class="form-label">ПОСТАВЩИК</label>
        <select class="form-select" id="f-supplier">
          <option value="">Загрузка…</option>
        </select>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">
      <span id="submit-label">Записать</span>
    </button>

  </div>

  <!-- ── CHAT TAB ── -->
  <div class="tab-pane" id="tab-chat">
    <div class="chat-scroll" id="chat-scroll">
      <div class="bubble bot">Привет! Пиши мне о деньгах — запишу и дам совет. Или задай вопрос про финансы. 🍵</div>
    </div>
    <div class="chat-bar">
      <textarea class="chat-input" id="chat-input" rows="1" placeholder="Написать…"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendChat()">▶</button>
    </div>
  </div>

</div>

<!-- Bottom navigation -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="switchTab('dashboard')">
    <span class="icon">📊</span><span>Главная</span>
  </button>
  <button class="nav-btn" id="nav-add" onclick="switchTab('add')">
    <span class="icon">➕</span><span>Добавить</span>
  </button>
  <button class="nav-btn" id="nav-chat" onclick="switchTab('chat')">
    <span class="icon">💬</span><span>Чат</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

// ── Tab navigation ──────────────────────────────────────────────────────────

const tabsContent = document.getElementById('tabs-content');

function switchTab(name) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');

  if (name === 'chat') {
    tabsContent.style.overflow = 'hidden';
    scrollChat();
  } else {
    tabsContent.style.overflow = '';
    tabsContent.style.overflowY = 'auto';
  }
  if (name === 'dashboard') loadDashboard();
}

// ── Formatting ──────────────────────────────────────────────────────────────

function fmt(n) {
  return new Intl.NumberFormat('ru-RU').format(Math.round(Math.abs(n))) + '₴';
}

// ── Toast ───────────────────────────────────────────────────────────────────

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', 2800);
}

// ── Dashboard ───────────────────────────────────────────────────────────────

let dashboardLoaded = false;

async function loadDashboard() {
  document.getElementById('snap-loading').style.display = 'flex';
  document.getElementById('snap-data').style.display = 'none';
  document.getElementById('debts-loading').style.display = 'flex';
  document.getElementById('debts-list').innerHTML = '';

  try {
    const [snap, debts] = await Promise.all([
      fetch('/api/snapshot').then(r => r.json()),
      fetch('/api/debts').then(r => r.json()),
    ]);

    // Today snapshot
    document.getElementById('s-income').textContent = fmt(snap.today_income);
    document.getElementById('s-expense').textContent = fmt(snap.today_expense);
    const balEl = document.getElementById('s-balance');
    const bal = snap.today_balance;
    balEl.textContent = (bal >= 0 ? '+' : '−') + fmt(bal);
    balEl.className = 'stat-value ' + (bal >= 0 ? 'pos' : 'neg');
    document.getElementById('snap-loading').style.display = 'none';
    document.getElementById('snap-data').style.display = 'block';

    // Debts
    document.getElementById('debts-loading').style.display = 'none';
    if (!debts.length) {
      document.getElementById('debts-list').innerHTML = '<div class="empty-hint">Долгов нет 🎉</div>';
    } else {
      document.getElementById('debts-list').innerHTML = debts.map(d => {
        const pct = d.original > 0 ? Math.min(100, (d.original - d.remaining) / d.original * 100) : 100;
        const done = d.remaining <= 0;
        return `<div class="debt-item">
          <div class="debt-row">
            <span class="debt-supplier">${d.supplier}</span>
            <span class="debt-amount ${done ? 'done' : ''}">${done ? '✓ Погашен' : fmt(d.remaining)}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="debt-meta"><span>Погашено: ${fmt(d.paid)}</span><span>${Math.round(pct)}%</span></div>
        </div>`;
      }).join('');
      updateSupplierSelect(debts);
    }
    dashboardLoaded = true;
  } catch (e) {
    document.getElementById('snap-loading').style.display = 'none';
    document.getElementById('debts-loading').style.display = 'none';
    document.getElementById('debts-list').innerHTML = '<div class="empty-hint">Ошибка загрузки</div>';
  }
}

// ── Add form ─────────────────────────────────────────────────────────────────

let currentType = 'income';

function setType(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-type="${type}"]`).classList.add('active');
  document.getElementById('income-fields').style.display  = type === 'income'  ? 'block' : 'none';
  document.getElementById('expense-fields').style.display = type === 'expense' ? 'block' : 'none';
  document.getElementById('repay-fields').style.display   = type === 'repay'   ? 'block' : 'none';
  document.getElementById('f-amount').value = '';
}

function pickChip(el) {
  document.querySelectorAll('#cat-chips .chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('f-expense-cat').value = el.textContent;
}

function updateSupplierSelect(debts) {
  const active = debts.filter(d => d.remaining > 0);
  const sel = document.getElementById('f-supplier');
  if (!active.length) {
    sel.innerHTML = '<option value="">Нет активных долгов</option>';
  } else {
    sel.innerHTML = active.map(d =>
      `<option value="${d.supplier}">${d.supplier} — ${fmt(d.remaining)}</option>`
    ).join('');
  }
}

async function submitForm() {
  const amount = parseFloat(document.getElementById('f-amount').value);
  if (!amount || amount <= 0) { toast('Введи сумму', 'err'); return; }

  const btn = document.getElementById('submit-btn');
  const label = document.getElementById('submit-label');
  btn.disabled = true;
  label.innerHTML = '<div class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;width:18px;height:18px"></div>';

  try {
    let res;
    if (currentType === 'income') {
      const desc = document.getElementById('f-income-desc').value.trim() || 'Доход';
      res = await fetch('/api/income', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ amount, description: desc }),
      }).then(r => r.json());

    } else if (currentType === 'expense') {
      const cat = document.getElementById('f-expense-cat').value.trim() || 'Другое';
      res = await fetch('/api/expense', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ amount, category: cat }),
      }).then(r => r.json());

    } else {
      const supplier = document.getElementById('f-supplier').value;
      if (!supplier) { toast('Выбери поставщика', 'err'); return; }
      res = await fetch('/api/repay', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ amount, supplier }),
      }).then(r => r.json());
    }

    if (res.ok) {
      toast(res.message, 'ok');
      document.getElementById('f-amount').value = '';
      tg?.HapticFeedback?.notificationOccurred('success');
      dashboardLoaded = false;
    } else {
      toast(res.detail || 'Ошибка', 'err');
    }
  } catch {
    toast('Ошибка соединения', 'err');
  } finally {
    btn.disabled = false;
    label.textContent = 'Записать';
  }
}

// ── Chat ─────────────────────────────────────────────────────────────────────

function scrollChat() {
  const el = document.getElementById('chat-scroll');
  setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

function addBubble(text, role) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.textContent = text;
  document.getElementById('chat-scroll').appendChild(div);
  scrollChat();
  return div;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  const btn = document.getElementById('send-btn');
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addBubble(msg, 'user');

  const typing = addBubble('', 'bot');
  typing.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px"></div>';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg }),
    }).then(r => r.json());
    typing.textContent = res.response || 'Ошибка ответа';
  } catch {
    typing.textContent = 'Ошибка соединения';
  } finally {
    btn.disabled = false;
    scrollChat();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

loadDashboard();
fetch('/api/debts').then(r => r.json()).then(updateSupplierSelect).catch(() => {});
</script>
</body>
</html>
